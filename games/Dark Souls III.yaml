Dark Souls III:
  early_banner: early_local
  late_basin_of_vows:
    'off': 25
    after_small_lothric_banner: 50
    after_small_doll: 50
  late_dlc:
    'off': 25
    after_small_doll: 50
    after_basin: 50
  death_link: 'off'
  death_link_amnesty: 1
  enable_dlc:
    'false': 4
    'true': 1
  enable_ngp: 
    'false': 1
    'true': 1
  random_starting_loadout:
    'false': 25
    'true': 75
  require_one_handed_starting_weapons: 'true'
  no_equip_load:
    'false': 2
    'true': 3
  no_weapon_requirements:
    'false': 2
    'true': 3
  no_spell_requirements:
    'false': 2
    'true': 3
  randomize_infusion:
    'false': 50
    'true': 50
  randomize_infusion_percentage: random
  randomize_weapon_level:
    all: 5
    basic: 1
    epic: 1
    none: 4
  randomize_weapon_level_percentage: random-range-10-100
  min_levels_in_5: 1
  max_levels_in_5: 5
  min_levels_in_10: 1
  max_levels_in_10: 10
  smooth_soul_items: 'true'
  smooth_upgrade_items: 'true'
  smooth_upgraded_weapons: 'true'
  randomize_enemies: 'false'
  simple_early_bosses: 'true'
  scale_enemies: 'true'
  randomize_mimics_with_enemies: 'false'
  randomize_small_crystal_lizards_with_enemies: 'false'
  reduce_harmless_enemies: 'false'
  all_chests_are_mimics: 'false'
  impatient_mimics: 'false'
  goal:
    - Kiln of the First Flame Boss
  local_items:
    - Pyromancy Flame
    - Transposing Kiln
  non_local_items:
    # Can be unobtainable in certain local locations
    ['Path of the Dragon']
  exclude_locations:
    ['Small Souls', 'Miscellaneous', 'Hidden', 'Small Crystal Lizards', 'Upgrade', "AL: Aldrich's Ruby - dark cathedral, miniboss"]
  excluded_location_behavior: forbid_useful
  missable_location_behavior: forbid_useful

  #This will trigger which goal would be selected
  GoalOption:
    Soul_of_Cinder: 2
    Base_Game_Bosses: 1
    Slave_Knight_Gael: 0
    DLC_Bosses: 0
    All_Bosses: 0

  triggers:
    # This trigger rerolls the GoalOption to include dlc bosses if dlc is enabled
    - option_category: Dark Souls III
      option_name: enable_dlc
      option_result: 'true'
      options:
        Dark Souls III:
          GoalOption:
            Soul_of_Cinder: 2
            Base_Game_Bosses: 1
            Slave_Knight_Gael: 8
            DLC_Bosses: 6
            All_Bosses: 3
    # Triggers for the goal
    - option_category: Dark Souls III
      option_name: GoalOption
      option_result: Soul_of_Cinder
      options:
        Dark Souls III:
          goal: 
          - Kiln of the First Flame Boss
          +local_items:
            - Cinders of a Lord - Abyss Watcher
            - Cinders of a Lord - Yhorm the Giant
            - Cinders of a Lord - Aldrich
            - Cinders of a Lord - Lothric Prince
    - option_category: Dark Souls III
      option_name: GoalOption
      option_result: Base_Game_Bosses
      options:
        Dark Souls III:
          goal: 
          - Base Game Bosses
    - option_category: Dark Souls III
      option_name: GoalOption
      option_result: Slave_Knight_Gael
      options:
        Dark Souls III:
          goal: 
          - Ringed City End Boss
    - option_category: Dark Souls III
      option_name: GoalOption
      option_result: DLC_Bosses
      options:
        Dark Souls III:
          goal: 
          - DLC Bosses
    - option_category: Dark Souls III
      option_name: GoalOption
      option_result: All_Bosses
      options:
        Dark Souls III:
          goal: 
          - All Bosses

    - option_category: null
      option_name: name
      option_result: Player{player}
      options:
        null:
          name: DS3-{player}
