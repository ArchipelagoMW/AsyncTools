Starcraft 2:
  game_format:
    # Overarching trigger, selecting one of these formats
    # Each format should consistently roll the exact amount of missions specified
    # This should provide a way to easily identify them in the options table
    standard: 30
    #   # 50 missions, Grid/Golden Path/Hopscotch/Blitz
    challenge: 20
    #   # 35 missions, Grid/Golden Path/Hopscotch/Blitz
    #   # any_unit logic, reduced checks, always hard/brutal, trap items
    free_to_play: 20
    #   # 30 missions, Grid/Golden Path/Hopscotch/Blitz
    #   # only missions that are available for free (WoL, Prophecy, Prologue)
    single_race_terran: 3
    single_race_zerg: 3
    single_race_protoss: 3
    #   # 25 missions, Grid/Golden Path/Hopscotch/Blitz
    #   # shorter mission order, only one race
    vanilla: 3
    vanilla_shuffled: 3
    #   # 83 missions, vanilla/vanilla shuffled
    #   # race-swaps disabled, vanilla-like experience
    #   # will always have progressive keys to prevent huge early releases
    full_campaign: 5
    #   # 195 missions, reduced checks, reduced effects of fillers 
    #   # Designed to roll with all items, but not have too many fillers beyond that
    #   # will always have progressive keys to prevent huge early releases
    custom_big_async_logo: 5
    #   # 105 missions, custom mission order
    #   # canvas layout representing a Big Async logo
    custom_swapped_campaigns: 5
    #   # 42 missions, custom mission order
    #   # 6 columns of 7 missions each, each column representing one campaign with swapped race


  game_difficulty:
    # Affects all game formats, sets the ingame difficulty setting
    # Additionally affects several other settings, which have an effect on difficulty
    # most notably limits to upgrades per unit, limits to SoA and Kerrigan abilities
    # as well as settings for Weapon/Armor upgrades and difficult checks
    casual: 10
    normal: 25
    hard: 40
    brutal: 25

  # These options are not affected by triggers
  # They will always roll as stated in this section
  all_in_map: random
  ensure_generic_items: 25
  generic_upgrade_research_speedup: false
  vanilla_items_only: false
  grant_story_tech: allow_substitutes
  mission_order_scouting: completed
  enable_void_trade: true
  void_trade_age_limit: 1_week
  void_trade_workers: false
  enable_morphling: true
  take_over_ai_allies: false
  nova_ghost_of_a_chance_variant: auto
  mercenary_highlanders: true
  difficulty_curve: standard
  mission_race_balancing: semi_balanced
  vanilla_locations: enabled
  extra_locations: enabled
  challenge_locations: enabled

  # These options will sometimes be overridden by a trigger
  maximum_campaign_size: 10  # should always be changed by a trigger. If it ends up with 10, something went wrong
  required_tactics: standard
  mission_order:
    # standard distribution for mission orders
    grid: 30
    golden_path: 40
    hopscotch: 20
    Blitz: 10
  enabled_campaigns:
    - 'Wings of Liberty'
    - 'Prophecy'
    - 'Heart of the Swarm'
    - 'Whispers of Oblivion (Legacy of the Void: Prologue)'
    - 'Legacy of the Void'
    - 'Into the Void (Legacy of the Void: Epilogue)'
    - 'Nova Covert Ops'
  selected_races:
    - 'Terran'
    - 'Zerg'
    - 'Protoss'
  enable_race_swap: shuffle_all
  shuffle_no_build: true
  starter_unit: off
  two_start_positions: true
  difficulty_damage_modifier: false
  min_number_of_upgrades: 2
  max_number_of_upgrades: -1
  generic_upgrade_research: vanilla
  max_upgrade_level: 3
  generic_upgrade_items: individual_items
  generic_upgrade_missions: 25
  exclude_overpowered_items: true
  war_council_nerfs: true
  grant_story_levels: disabled
  kerrigan_presence: vanilla
  kerrigan_levels_per_mission_completed: 0
  kerrigan_levels_per_mission_completed_cap: -1
  kerrigan_level_item_sum: 70
  kerrigan_level_item_distribution: vanilla
  mastery_locations: filler
  speedrun_locations: filler
  exclude_very_hard_missions: false
  spear_of_adun_presence: vanilla
  spear_of_adun_present_in_no_build: false
  spear_of_adun_passive_ability_presence: vanilla
  spear_of_adun_passive_present_in_no_build: false
  spear_of_adun_max_active_abilities: 13
  spear_of_adun_max_passive_abilities: 3
  nova_max_weapons: 5
  kerrigan_max_active_abilities: 12
  kerrigan_max_passive_abilities: 5
  key_mode: disabled
  victory_cache: 0
  filler_percentage: 0
  minerals_per_item: 10
  vespene_per_item: 10
  starting_supply_per_item: 2
  maximum_supply_per_item: 2
  maximum_supply_reduction_per_item: 1
  lowest_maximum_supply: 200
  research_cost_reduction_per_item: 5
  filler_items_distribution:
    1 Kerrigan Level: 0
    Additional Maximum Supply: 1
    Additional Starting Minerals: 1
    Additional Starting Supply: 1
    Additional Starting Vespene: 1
    Decreased Maximum Supply: 0
    Increased Building Construction Speed: 1
    Increased Shield Regeneration: 1
    Increased Upgrade Research Speed: 1
    Reduced Upgrade Research Cost: 1
  custom_mission_order: 
    # needs to exist, so we can override it with triggers
    # fill with minimum values to be valid
    Empty:
      type: column
      size: 1

  excluded_missions:
    # tends to cause issues with Kerrigan levels/items
    # unexcluded only for full campaign
    - 'The Infinite Cycle'

  triggers: 
    # Game formats
    - option_category: Starcraft 2
      option_name: game_format
      option_result: standard
      options:
        Starcraft 2:
          maximum_campaign_size: 50
          enable_race_swap: pick_one

    - option_category: Starcraft 2
      option_name: game_format
      option_result: challenge
      options:
        Starcraft 2:
          maximum_campaign_size: 30
          enable_race_swap: pick_one
          required_tactics: any_units
          game_difficulty: 
              hard: 40
              brutal: 60
          maximum_supply_reduction_per_item: 10
          filler_items_distribution:
              1 Kerrigan Level: 0
              Additional Maximum Supply: 10
              Additional Starting Minerals: 10
              Additional Starting Supply: 10
              Additional Starting Vespene: 10
              Decreased Maximum Supply: 1
              Increased Building Construction Speed: 10
              Increased Shield Regeneration: 10
              Increased Upgrade Research Speed: 10
              Reduced Upgrade Research Cost: 10

    - option_category: Starcraft 2
      option_name: game_format
      option_result: free_to_play
      options:
        Starcraft 2:
          maximum_campaign_size: 35
          enabled_campaigns: !!set
            ? 'Wings of Liberty'
            ? 'Prophecy'
            ? 'Whispers of Oblivion (Legacy of the Void: Prologue)'

    - option_category: Starcraft 2
      option_name: game_format
      option_result: single_race_terran
      options:
        Starcraft 2:
          maximum_campaign_size: 25
          enable_race_swap: pick_one
          selected_races: !!set
            ? 'Terran'
          kerrigan_presence: not_present
          spear_of_adun_presence: not_present
          spear_of_adun_passive_present_in_no_build: not_present

    - option_category: Starcraft 2
      option_name: game_format
      option_result: single_race_zerg
      options:
        Starcraft 2:
          maximum_campaign_size: 25
          enable_race_swap: pick_one
          selected_races: !!set
            ? 'Zerg'
          spear_of_adun_presence: not_present
          spear_of_adun_passive_present_in_no_build: not_present

    - option_category: Starcraft 2
      option_name: game_format
      option_result: single_race_protoss
      options:
        Starcraft 2:
          maximum_campaign_size: 25
          enable_race_swap: pick_one
          selected_races: !!set
            ? 'Protoss'
          kerrigan_presence: not_present

    - option_category: Starcraft 2
      option_name: game_format
      option_result: vanilla
      options:
        Starcraft 2:
          maximum_campaign_size: 83
          mission_order: vanilla
          enable_race_swap: disabled
          excluded_missions: []  # un-do all exclusions

    - option_category: Starcraft 2
      option_name: game_format
      option_result: vanilla_shuffled
      options:
        Starcraft 2:
          maximum_campaign_size: 83
          mission_order: vanilla_shuffled
          enable_race_swap: pick_one
          excluded_missions: []  # un-do all exclusions

    - option_category: Starcraft 2
      option_name: game_format
      option_result: full_campaign
      options:
        Starcraft 2:
          maximum_campaign_size: 195
          full_campaign_mission_order: 
            # only allow grid or golden path for 195 missions
            # and force them to always have keys
            # to prevent huge early releases
            # grid_keys: 40
            golden_path_keys: 40 
            # blitz_keys: 20 
            # don't include hopscotch here, that does become jarring on 195 missions
          excluded_missions: []  # un-do all exclusions

    # Match key mode to mission orders
    - option_category: Starcraft 2
      option_name: mission_order
      option_result: vanilla
      options:
        Starcraft 2:
          enable_race_swap: disabled
          key_mode: 
            progressive_missions: 40
            progressive_questlines: 30
            progressive_per_questline: 30
    - option_category: Starcraft 2
      option_name: mission_order
      option_result: vanilla_shuffled
      options:
        Starcraft 2:
          key_mode: 
            progressive_missions: 40
            progressive_questlines: 30
            progressive_per_questline: 30
    - option_category: Starcraft 2
      option_name: mission_order
      option_result: grid
      options:
        Starcraft 2:
          key_mode: 
            progressive_missions: 80
            disabled: 20
    - option_category: Starcraft 2
      option_name: mission_order
      option_result: golden_path
      options:
        Starcraft 2:
          key_mode: 
            progressive_missions: 30
            progressive_questlines: 20
            progressive_per_questline: 30
            disabled: 20
    - option_category: Starcraft 2
      option_name: mission_order
      option_result: hopscotch
      options:
        Starcraft 2:
          key_mode: 
            progressive_missions: 80
            disabled: 20
    - option_category: Starcraft 2
      option_name: mission_order
      option_result: blitz
      options:
        Starcraft 2:
          key_mode: 
            progressive_missions: 80
            disabled: 20

    # difficulty
    # casual: auto upgrades, no limits on upgrades per unit
    # no war council nerfs, all OP items, mastery locations disabled
    - option_category: Starcraft 2
      option_name: game_difficulty
      option_result: casual
      options:
        Starcraft 2:
          starter_unit: balanced
          difficulty_damage_modifier: true # makes your units take less damage on casual
          min_number_of_upgrades: 5
          max_number_of_upgrades: -1
          generic_upgrade_research: always_auto
          max_upgrade_level: 5
          generic_upgrade_items: bundle_all
          generic_upgrade_missions: 15
          exclude_overpowered_items: false
          war_council_nerfs: false
          kerrigan_presence: vanilla
          kerrigan_levels_per_mission_completed: 0
          kerrigan_levels_per_mission_completed_cap: -1
          kerrigan_level_item_sum: 70
          kerrigan_level_item_distribution: vanilla
          mastery_locations: disabled
          spear_of_adun_presence: protoss
          spear_of_adun_present_in_no_build: true
          spear_of_adun_passive_ability_presence: protoss
          spear_of_adun_passive_present_in_no_build: true
          spear_of_adun_max_active_abilities: 13
          spear_of_adun_max_passive_abilities: 3
          nova_max_weapons: 5
          kerrigan_max_active_abilities: 12
          kerrigan_max_passive_abilities: 5
          filler_percentage: 0
          filler_items_distribution:
            Additional Maximum Supply: 1
            Additional Starting Minerals: 1
            Additional Starting Supply: 1
            Additional Starting Vespene: 1
            Decreased Maximum Supply: 0
            Increased Building Construction Speed: 1
            Increased Shield Regeneration: 1
            Increased Upgrade Research Speed: 0
            Reduced Upgrade Research Cost: 0

    # normal: auto upgrades in no-builds, no limits on upgrades per unit
    # no war council nerfs, OP items disabled
    - option_category: Starcraft 2
      option_name: game_difficulty
      option_result: normal
      options:
        Starcraft 2:
          starter_unit: any_starter_unit
          difficulty_damage_modifier: false
          min_number_of_upgrades: 3
          max_number_of_upgrades: -1
          generic_upgrade_research: auto_in_no_build
          max_upgrade_level: 4
          generic_upgrade_items: individual_items
          generic_upgrade_missions: 0
          exclude_overpowered_items: true
          war_council_nerfs: false
          kerrigan_presence: vanilla
          kerrigan_levels_per_mission_completed: 0
          kerrigan_levels_per_mission_completed_cap: -1
          kerrigan_level_item_sum: 70
          kerrigan_level_item_distribution: vanilla
          mastery_locations: filler
          spear_of_adun_presence: protoss
          spear_of_adun_present_in_no_build: false
          spear_of_adun_passive_ability_presence: protoss
          spear_of_adun_passive_present_in_no_build: true
          spear_of_adun_max_active_abilities: 8
          spear_of_adun_max_passive_abilities: 3
          nova_max_weapons: 4
          kerrigan_max_active_abilities: 8
          kerrigan_max_passive_abilities: 4
          filler_percentage: 10
          minerals_per_item: 10
          vespene_per_item: 10
          starting_supply_per_item: 2
          maximum_supply_per_item: 2
          maximum_supply_reduction_per_item: 1
          lowest_maximum_supply: 200
          filler_items_distribution:
            Additional Maximum Supply: 1
            Additional Starting Minerals: 1
            Additional Starting Supply: 1
            Additional Starting Vespene: 1
            Decreased Maximum Supply: 0
            Increased Building Construction Speed: 1
            Increased Shield Regeneration: 1
            Increased Upgrade Research Speed: 1
            Reduced Upgrade Research Cost: 1

    # hard: upgrades need research, some limits on upgrades per unit
    # limits on SoA/Kerrigan, war council nerfs, some forced fillers
    - option_category: Starcraft 2
      option_name: game_difficulty
      option_result: hard
      options:
        Starcraft 2:
          starter_unit: off
          difficulty_damage_modifier: false
          min_number_of_upgrades: 2
          max_number_of_upgrades: 5
          generic_upgrade_research: vanilla
          max_upgrade_level: 3
          generic_upgrade_items: individual_items
          generic_upgrade_missions: 0
          exclude_overpowered_items: true
          war_council_nerfs: true
          kerrigan_presence: vanilla
          kerrigan_levels_per_mission_completed: 0
          kerrigan_levels_per_mission_completed_cap: -1
          kerrigan_level_item_sum: 70
          kerrigan_level_item_distribution: vanilla
          spear_of_adun_presence: protoss
          spear_of_adun_present_in_no_build: false
          spear_of_adun_passive_ability_presence: protoss
          spear_of_adun_passive_present_in_no_build: false
          spear_of_adun_max_active_abilities: 5
          spear_of_adun_max_passive_abilities: 2
          nova_max_weapons: 3
          kerrigan_max_active_abilities: 5
          kerrigan_max_passive_abilities: 3
          filler_percentage: 20
          minerals_per_item: 10
          vespene_per_item: 10
          starting_supply_per_item: 2
          maximum_supply_per_item: 2

    # brutal: upgrades need research, stricter limits on upgrades per unit
    # Kerrigan disabled, limits on SoA, war council nerfs, more forced fillers, trap items
    - option_category: Starcraft 2
      option_name: game_difficulty
      option_result: brutal
      options:
        Starcraft 2:
          starter_unit: off
          difficulty_damage_modifier: true
          min_number_of_upgrades: 1
          max_number_of_upgrades: 4
          generic_upgrade_research: vanilla
          max_upgrade_level: 3
          generic_upgrade_items: individual_items
          generic_upgrade_missions: 0
          exclude_overpowered_items: true
          war_council_nerfs: true
          kerrigan_presence: not_present
          kerrigan_levels_per_mission_completed: 0
          kerrigan_levels_per_mission_completed_cap: 0
          kerrigan_level_item_sum: 0
          kerrigan_level_item_distribution: vanilla
          spear_of_adun_presence: vanilla
          spear_of_adun_present_in_no_build: false
          spear_of_adun_passive_ability_presence: vanilla
          spear_of_adun_passive_present_in_no_build: false
          spear_of_adun_max_active_abilities: 4
          spear_of_adun_max_passive_abilities: 1
          nova_max_weapons: 2
          kerrigan_max_active_abilities: 0
          kerrigan_max_passive_abilities: 0
          filler_percentage: 30
          minerals_per_item: 10
          vespene_per_item: 10
          starting_supply_per_item: 2
          maximum_supply_per_item: 2

    # very big mission orders, always force keys to prevent huge early release
    - option_category: Starcraft 2
      option_name: full_campaign_mission_order
      option_result: grid_keys
      options:
        Starcraft 2:
          mission_order: grid
          key_mode: progressive_missions
    - option_category: Starcraft 2
      option_name: full_campaign_mission_order
      option_result: blitz_keys
      options:
        Starcraft 2:
          mission_order: blitz
          key_mode: progressive_missions
    - option_category: Starcraft 2
      option_name: full_campaign_mission_order
      option_result: golden_path_keys
      options:
        Starcraft 2:
          mission_order: golden_path
          key_mode: 
            progressive_missions: 50
            progressive_per_questline: 50

    # Custom Big Async canvas
    - option_category: Starcraft 2
      option_name: game_format
      option_result: custom_big_async_logo
      options:
        Starcraft 2:
          maximum_campaign_size: 105  # has no effect, just for clarity
          mission_order: custom
          custom_mission_order:
            The Big Async:
              type: canvas
              canvas:
                # Big Async logo
                - ' bbb  aa  ccc   '  # 01
                - ' z  z tt p      '  # 02
                - ' z  z tt p      '  # 03
                - ' zzz  tt p pp   '  # 04
                - ' z  z tt p   p  '  # 05
                - ' z  z tt p   p  '  # 06
                - ' zzz  tt  ppp   '  # 07
                - '                '  # 08
                - ' t  p t tz  z pp'  # 09
                - ' t p pt tz  zp  '  # 10
                - 't tp  t tzz zp  '  # 11
                - 't t p  t zzzzp  '  # 12
                - 'ttt  p t z zzp  '  # 13
                - 't tp p t z  zp  '  # 14
                - 'T T P  T Z  Z PP'  # 15
                
                # 105 missions total
                # Terran: I + A + Y = 37 missions
                # Zerg: B + N = 35 missions
                # Protoss: G + S + C = 33 missions
                
              jump_distance_orthogonal: 2
              jump_distance_diagonal: 1
              missions:
                - index:
                    - group(a)  # Terran starters
                  mission_pool:
                    - Terran Missions
                  entrance: true
                - index:
                    - group(b)  # Zerg starters
                  mission_pool:
                    - Zerg Missions
                  entrance: true
                - index:
                    - group(c)  # Protoss starters
                  mission_pool:
                    - Protoss Missions
                  entrance: true
                - index:
                    - group(t)
                  mission_pool:
                    - Terran Missions
                  entry_rules:
                  - items: 
                        Progressive Key: 2
                - index:
                    - group(z)
                  mission_pool:
                    - Zerg Missions
                  entry_rules:
                  - items: 
                        Progressive Key: 1
                - index:
                    - group(p)
                  mission_pool:
                    - Protoss Missions
                  entry_rules:
                  - items: 
                        Progressive Key: 3
                - index:
                    - group(T)
                  mission_pool:
                    - Terran Missions
                  entry_rules:
                  - items: 
                        Progressive Key: 2
                  difficulty: very_hard
                  exit: true
                  goal: true
                - index:
                    - group(Z)
                  mission_pool:
                    - Zerg Missions
                  entry_rules:
                  - items: 
                        Progressive Key: 1
                  difficulty: very_hard
                  exit: true
                  goal: true
                - index:
                    - group(P)
                  mission_pool:
                    - Protoss Missions
                  entry_rules:
                  - items: 
                        Progressive Key: 3
                  difficulty: very_hard
                  exit: true
                  goal: true

    # Custom race-swapped campaigns
    - option_category: Starcraft 2
      option_name: game_format
      option_result: custom_swapped_campaigns
      options:
        Starcraft 2:
          maximum_campaign_size: 42  # has no effect, just for clarity
          enable_race_swap: pick_one_non_vanilla
          mission_order: custom
          kerrigan_presence: not_present  # Kerrigan currently cannot appear in forced race swaps
          spear_of_adun_presence: protoss  # override vanilla setting, as that would not work in forced race swaps
          custom_mission_order:
            Swap of the Race:
                #  6 columns times 7 missions = 42 missions
                Wings of the Swarm:
                    size: 7
                    type: column
                    mission_pool: 
                        - Terran Missions
                        - ^ HotS Missions
                    missions: 
                        - index: [1, 3, 5]
                          entry_rules:
                            - items: 
                                Progressive Key: 1  # each key unlocks 2 missions
                        - index: [6]
                          goal: true
                Heart of the Void:
                    size: 7
                    type: column
                    mission_pool: 
                        - LotV Missions
                        - Prophecy Missions
                        - Prologue Missions
                        - ^ Zerg Missions
                    missions: 
                        - index: [1, 3, 5]
                          entry_rules:
                            - items: 
                                Progressive Key: 2
                        - index: [6]
                          goal: true
                Legacy of Liberty:
                    size: 7
                    type: column
                    mission_pool: 
                        - Protoss Missions
                        - ^ WoL Missions
                    missions: 
                        - index: [1, 3, 5]
                          entry_rules:
                            - items: 
                                Progressive Key: 3
                        - index: [6]
                          goal: true
                Wings of the Void:
                    size: 7
                    type: column
                    mission_pool: 
                        - LotV Missions
                        - Prophecy Missions
                        - Prologue Missions
                        - ^ Terran Missions
                    missions: 
                        - index: [1, 3, 5]
                          entry_rules:
                            - items: 
                                Progressive Key: 4
                        - index: [6]
                          goal: true
                Heart of Liberty:
                    size: 7
                    type: column
                    mission_pool: 
                        - Zerg Missions
                        - ^ WoL Missions
                    missions: 
                        - index: [1, 3, 5]
                          entry_rules:
                            - items: 
                                Progressive Key: 5
                        - index: [6]
                          goal: true
                Legacy of the Swarm:
                    size: 7
                    type: column
                    mission_pool: 
                        - Protoss Missions
                        - ^ HotS Missions
                    missions: 
                        - index: [1, 3, 5]
                          entry_rules:
                            - items: 
                                Progressive Key: 6
                        - index: [6]
                          goal: true         

    # long games - reduce effect of fillers
    - option_category: Starcraft 2
      option_name: maximum_campaign_size
      option_result: 195  # Game Format: Full Campaign
      options:
        Starcraft 2:
          minerals_per_item: 5
          vespene_per_item: 5
          starting_supply_per_item: 1
          maximum_supply_per_item: 1
          research_cost_reduction_per_item: 2
    - option_category: Starcraft 2
      option_name: maximum_campaign_size
      option_result: 83  # Game Format: Vanilla
      options:
        Starcraft 2:          
          minerals_per_item: 8
          vespene_per_item: 8
          starting_supply_per_item: 2
          maximum_supply_per_item: 1
          research_cost_reduction_per_item: 3
    - option_category: Starcraft 2
      option_name: maximum_campaign_size
      option_result: 105  # Game Format: Custom Big Async Canvas
      options:
        Starcraft 2:          
          minerals_per_item: 8
          vespene_per_item: 8
          starting_supply_per_item: 2
          maximum_supply_per_item: 1
          research_cost_reduction_per_item: 3

    # match options for clarity
    # Kerrigan
    - option_category: Starcraft 2
      option_name: kerrigan_presence
      option_result: not_present
      # if Kerrigan is not present, disable/null all related options
      options:
        Starcraft 2:
          grant_story_levels: disabled
          kerrigan_levels_per_mission_completed: 0
          kerrigan_levels_per_mission_completed_cap: 0
          kerrigan_level_item_sum: 0
          kerrigan_level_item_distribution: vanilla
          kerrigan_total_level_cap: 0
          start_primary_abilities: 0
          kerrigan_primal_status: vanilla
          kerrigan_max_active_abilities: 0
          kerrigan_max_passive_abilities: 0

    # Spear of Adun
    - option_category: Starcraft 2
      option_name: spear_of_adun_presence
      option_result: not_present
