Dragon Warrior:
  accessibility:
    full: 50

  #######################
  # Archipelago Options #
  #######################
  levelsanity:
    # This adds between 15-30 checks depending on on the LevelSanity Range option below.
    'false': 20
    'true': 80
  levelsanity_range:
    random-range-15-30: 50
  searchsanity:
    # This adds 3 checks, and shuffles an extra progression item needed to goal into the itempool.
    'false': 20
    'true': 80
  shopsanity:
    # This adds 13 checks + Progressive Equipment Items. Entering a town will also create AP Hints for items in the shop there, if any.
    'false': 50
    'true': 50
  monstersanity:
    # This adds 40 checks.
    'false': 70
    'true': 30
  death_link:
    'false': 50

  ##################
  # Random Options #
  ##################
  # The remaining options in this YAML are pulled directly from the DWRandomizer used to patch the game.
  # Many of them are forced off/on for the sake of stability.

  random_growth:
    'false': 70
    'true': 30
  random_map:
    'false': 50
  random_map_size:
    normal: 50
  random_spell_learning:
    'false': 80
    'true': 20
  random_weapon_shops:
    'false': 50
  random_weapon_prices:
    'false': 50
  heal_hurt_before_more:
    'true': 50
  random_xp_requirements:
    'false': 50
  random_monster_abilities:
    'false': 50
  random_monster_zones:
    'false': 50
  random_monster_stats:
    'false': 50
  random_monster_xp:
    'false': 50
  make_random_stats_consistent:
    'false': 50

  #####################
  # Challenge Options #
  #####################
  scared_metal_slimes:
    'false': 80
    'true': 20
